name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: front

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: front/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Ensure router dependency is available
        run: npm ls react-router-dom || npm install react-router-dom@^6.30.3 --no-save

      - name: Run tests
        run: npm test -- --watchAll=false --passWithNoTests

  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: back

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: projetofinal_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/projetofinal_test
      BLOB_READ_WRITE_TOKEN: fake_token_for_tests

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: back/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Run migrations
        run: npx prisma migrate deploy

      - name: Seed admin user
        run: npx prisma db seed

      - name: Run tests
        run: npm test -- --passWithNoTests
